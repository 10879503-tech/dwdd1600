<body>
    <!-- Header -->
    <header>
        <span>Rebecca Conklin Social Media Portfolio</span>  
    </header>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Me</a></li>
            <li><a href="collabs.html">Collabs</a></li>
            <li class="active"><a href="connect.html">Contact Me</a></li>
        </ul>
    </nav>

    <!-- Main content -->
    <main>
        <h1>Connect with Me!</h1>
        <form method="get" class="myForm" action="thanks.html">
        
        <fieldset class="contact-info">
             <legend>Contact Information</legend>
            <label>First Name *<input type="text" name="fname" required> </label>
            <label>Last Name *<input type="text" name="lname" required> </label>
            <label>Cell Number *<input type="tel" name="phone" required placeholder="8012345678"> </label>
            <label>Email *<input type="email" name="email" required placeholder="mycompany@mail.com"> </label>
        </fieldset>

        <fieldset>
            <legend> Collaboration Type</legend>

            <label><input type="radio" name="collab" value="sponsored"> Sponsored Post</label>
             <label><input type="radio" name="collab" value="gifted collab"> Gifted Collaboration</label>
              <label><input type="radio" name="collab" value="UGC"> UGC</label>
               <label><input type="radio" name="collab" value="affiliate"> Affiliate Partnership</label>
                <label><input type="radio" name="collab" value="PR"> PR Gifting</label>
        </fieldset>

        <fieldset>
            <legend>Project Details</legend>
            <label><input type="checkbox" name="instagram" value="chosen"> Instagram</label>
             <label><input type="checkbox" name="tiktok" value="chosen">TikTok</label>
              <label><input type="checkbox" name="youtube" value="chosen"> Youtube</label>

              <label>Budget Range
                <select name="budget">
                <option value="none">Please Select</option>
                <option value="gifted">Gifted Collaboration</option>
                <option value="low">$50-$500</option>
                <option value="medium">$500-$1000</option>
                <option value="high">$1000+</option>
                </select>
              </label>
               </fieldset>

              <label>Project Description
                <textarea name="message"></textarea>
              </label>

              <input type="submit" value="Send Collaboration Request">
            </form>
       

    </main>
